server.port=8080
spring.profiles.active=local

# App datasource — data access account (CRUD only)
spring.datasource.url=jdbc:postgresql://${DB_HOST}:5432/fakestore_users
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jooq.sql-dialect=POSTGRES

# Flyway — admin account (DDL privileges)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=jdbc:postgresql://${DB_HOST}:5432/fakestore_users
spring.flyway.user=${DB_ADMIN_USER}
spring.flyway.password=${DB_ADMIN_PASSWORD}

jwt.secret=${JWT_SECRET}
jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:1440}
