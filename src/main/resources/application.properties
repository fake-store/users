server.port=8080

# App datasource — data access account (CRUD only)
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:5432/fakestore_users
spring.datasource.username=${DB_USER:fakestore_users_user}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# Flyway — admin account (DDL privileges)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.url=jdbc:postgresql://${DB_HOST:localhost}:5432/fakestore_users
spring.flyway.user=${DB_ADMIN_USER:fakestore_admin}
spring.flyway.password=${DB_ADMIN_PASSWORD:password}

jwt.secret=${JWT_SECRET:change-me-in-production-min-32-chars!!}
